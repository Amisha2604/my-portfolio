            </ul>
        </nav>
    </header>

    <main>
        <section id="contact-form">
            <h2>Get in Touch</h2>
            <p>I'm always open to new opportunities and collaborations. Feel free to reach out!</p>
            <form action="mailto:your_email@example.com" method="post" enctype="text/plain">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
            <p>You can also connect with me on:</p>
            <ul>
                <li><a href="LINK_TO_LINKEDIN" target="_blank">LinkedIn</a></li>
                <li><a href="LINK_TO_GITHUB" target="_blank">GitHub</a></li>
            </ul>
        </section>
    </main>

    <footer>

    </footer>
